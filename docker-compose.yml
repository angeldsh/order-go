version: '3.8'

services:
  # Local PostgreSQL Database for Development
  postgres:
    image: postgres:15-alpine
    container_name: ordergo_postgres
    environment:
      POSTGRES_DB: ordergodb
      POSTGRES_USER: ordergo_user
      POSTGRES_PASSWORD: ordergo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # PgAdmin for Database Management (Optional, accessible at localhost:5050)
  pgadmin:
    image: dpage/pgadmin4
    container_name: ordergo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ordergo.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
