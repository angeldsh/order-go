<div class="bg-[var(--ion-color-step-50)] rounded-2xl shadow-sm border border-[var(--ion-color-step-100)] overflow-hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse font-sans min-w-max">
      <thead>
        <tr class="bg-[var(--ion-color-step-100)] text-[var(--ion-color-step-600)] text-xs uppercase tracking-wider font-semibold border-b border-[var(--ion-color-step-150)]">
          <th class="px-6 py-4">ID</th>
          <th class="px-6 py-4">Name</th>
          <th class="px-6 py-4 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-[var(--ion-color-step-100)] bg-[var(--ion-background-color)]">
        <tr *ngFor="let categoria of categorias" class="hover:bg-[var(--ion-color-step-50)] transition-colors group">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-[var(--ion-text-color)] font-medium">#{{ categoria.id }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-[var(--ion-text-color)]">{{ categoria.nombre }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <div class="flex justify-end space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button (click)="editarCategoria(categoria)" class="p-2 text-brand hover:bg-brand-100 rounded-lg transition-colors flex items-center justify-center focus:outline-none" title="Edit">
                <ion-icon name="create-outline" class="text-xl"></ion-icon>
              </button>
              <button (click)="eliminarCategoria(categoria)" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors flex items-center justify-center focus:outline-none" title="Delete">
                <ion-icon name="trash-outline" class="text-xl"></ion-icon>
              </button>
            </div>
          </td>
        </tr>
        
        <!-- Empty State -->
        <tr *ngIf="categorias.length === 0">
          <td colspan="3" class="px-6 py-12 text-center text-[var(--ion-color-step-500)] text-sm">
            <ion-icon name="folder-open-outline" class="text-4xl mb-3 text-[var(--ion-color-step-300)]"></ion-icon>
            <p>No categories found.</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
