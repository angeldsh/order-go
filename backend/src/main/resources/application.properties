spring.config.import=optional:file:.env[.properties]
server.port=80
jwt.jwtSecret=${JWT_SECRET:replace_this_with_a_secure_long_random_string_for_local_dev}
jwt.jwtExpirationMs=86400000
spring.application.name=proyecto

# Database Configuration (Defaults to Supabase, but can be overridden for Local Docker)
# To use Local Docker Compose, set these env vars:
# DB_URL=jdbc:postgresql://localhost:5432/ordergodb
# DB_USER=ordergo_user
# DB_PASSWORD=ordergo_password
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${DB_USER:postgres.jayfeplsvfnxsmfqrmhf}
spring.datasource.password=${DB_PASSWORD:your_supabase_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 'update' to not lose data, 'create' only the first time if you want to empty the DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:import.sql

spring.h2.console.enabled=false
logging.level.org.hibernate.SQL=DEBUG



dir_upload=./src/main/resources/uploads

# Gmail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.protocol=smtp
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8
spring.mail.username=${MAIL_USER:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
mail.smtp.from=${MAIL_USER:your_email@gmail.com}
mail.smtp.name=Order&Go