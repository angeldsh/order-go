# application-prod.properties
# Production configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=3

# Hibernate configuration for production
# We use 'update' to update the schema in prod without deleting data,
# or 'validate' if you prefer to apply schemas manually.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=false

# SQL Data Initialization (import.sql)
# In production it is better to use 'never' so it doesn't insert mock data every time it restarts,
# or 'always' only the first time to insert admin roles/users.
spring.sql.init.mode=${DB_INIT_MODE:never}

# Disable H2 console in production
spring.h2.console.enabled=false

# Configure JWT
jwt.jwtSecret=${JWT_SECRET:replace_this_with_a_secure_long_random_string_for_production}
jwt.jwtExpirationMs=${JWT_EXPIRATION:86400000}

# Mail Server (Same data or injected by variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
