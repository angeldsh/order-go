<div class="bg-[var(--ion-color-step-50)] rounded-2xl shadow-sm border border-[var(--ion-color-step-100)] overflow-hidden">
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse font-sans min-w-max">
      <thead>
        <tr class="bg-[var(--ion-color-step-100)] text-[var(--ion-color-step-600)] text-xs uppercase tracking-wider font-semibold border-b border-[var(--ion-color-step-150)]">
          <th class="px-6 py-4">Product</th>
          <th class="px-6 py-4">Category</th>
          <th class="px-6 py-4">Price</th>
          <th class="px-6 py-4">Description</th>
          <th class="px-6 py-4 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-[var(--ion-color-step-100)] bg-[var(--ion-background-color)]">
        <tr *ngFor="let producto of productos" class="hover:bg-[var(--ion-color-step-50)] transition-colors group">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-[var(--ion-text-color)] font-medium">
            <div class="flex items-center">
              <div class="h-10 w-10 flex-shrink-0 bg-[var(--ion-color-step-100)] rounded-xl overflow-hidden border border-[var(--ion-color-step-150)] mr-3">
                <img *ngIf="producto.imagen" [src]="'http://localhost/api/productos/foto/' + producto.id" class="h-full w-full object-cover" alt="{{ producto.nombre }}">
                <div *ngIf="!producto.imagen" class="h-full w-full flex items-center justify-center text-[var(--ion-color-step-400)]">
                  <ion-icon name="image-outline" class="text-xl"></ion-icon>
                </div>
              </div>
              <span>{{ producto.nombre }}</span>
            </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-[var(--ion-text-color)]">
            <span class="bg-[var(--ion-color-step-100)] px-2.5 py-1 rounded-lg text-xs font-medium">{{ producto.categoria.nombre }}</span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-brand">{{ producto.precio }}€</td>
          <td class="px-6 py-4 text-sm text-[var(--ion-color-step-600)] max-w-xs truncate">{{ producto.descripcion }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <div class="flex justify-end space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button (click)="editarProducto(producto)" class="p-2 text-brand hover:bg-brand-100 rounded-lg transition-colors flex items-center justify-center focus:outline-none" title="Edit">
                <ion-icon name="create-outline" class="text-xl"></ion-icon>
              </button>
              <button (click)="eliminarProducto(producto)" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors flex items-center justify-center focus:outline-none" title="Delete">
                <ion-icon name="trash-outline" class="text-xl"></ion-icon>
              </button>
            </div>
          </td>
        </tr>
        
        <!-- Empty State -->
        <tr *ngIf="productos.length === 0">
          <td colspan="5" class="px-6 py-12 text-center text-[var(--ion-color-step-500)] text-sm">
            <ion-icon name="fast-food-outline" class="text-4xl mb-3 text-[var(--ion-color-step-300)]"></ion-icon>
            <p>No products found.</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
