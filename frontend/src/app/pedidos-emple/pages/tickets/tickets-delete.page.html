<!-- Empty State -->
<div *ngIf="!tickets || tickets.length === 0" class="col-span-full h-32 flex flex-col items-center justify-center text-[var(--ion-color-step-400)] border-2 border-dashed border-[var(--ion-color-step-150)] rounded-3xl bg-[var(--ion-color-step-50)]">
  <ion-icon name="checkmark-done-circle-outline" class="text-3xl mb-2"></ion-icon>
  <span class="text-sm font-medium">All tables closed</span>
</div>

<!-- Ticket Cards -->
<div *ngFor="let ticket of tickets" class="bg-[var(--ion-background-color)] rounded-3xl p-5 shadow-sm border border-[var(--ion-color-step-150)] hover:shadow-md transition-all relative overflow-hidden group">
  <!-- Accent side border -->
  <div class="absolute top-0 bottom-0 left-0 w-1.5 bg-red-500"></div>

  <div class="flex justify-between items-start mb-4">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center shrink-0">
        <ion-icon name="restaurant-outline" class="text-xl"></ion-icon>
      </div>
      <div>
        <h4 class="font-bold text-base text-[var(--ion-text-color)] leading-none mb-1">Table {{ ticket.mesa.numero }}</h4>
        <span class="inline-block px-3 py-1 bg-[var(--ion-color-step-100)] text-[var(--ion-color-step-700)] text-sm md:text-base font-mono font-bold tracking-widest rounded-lg border border-[var(--ion-color-step-200)] mt-1">
          {{ ticket.codigoAcceso }}
        </span>
      </div>
    </div>
  </div>

  <button (click)="cerrarTicket(ticket.mesa.numero)" class="w-full bg-red-50 hover:bg-red-500 text-red-600 hover:text-white font-semibold py-2.5 px-4 rounded-xl transition-all active:scale-95 flex items-center justify-center space-x-2 border border-red-100 hover:border-red-500 focus:outline-none">
    <ion-icon name="close-circle-outline" class="text-lg"></ion-icon>
    <span class="text-sm">Close Ticket</span>
  </button>
</div>
